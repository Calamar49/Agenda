# ==============================================================================
# Apache VirtualHost – Agenda Web (HTTPS)
# Nodo 1 – Servidor Web: 192.168.56.104
# Fedora Server 43 / Apache 2.4
# ==============================================================================
#
# Instrucciones de instalación:
#   sudo cp agenda-ssl.conf /etc/httpd/conf.d/agenda-ssl.conf
#   sudo systemctl reload httpd
# ==============================================================================

# ── Redirigir HTTP → HTTPS ───────────────────────────────────────────────────
<VirtualHost *:80>
    ServerName 192.168.56.104
    Redirect permanent / https://192.168.56.104/
</VirtualHost>

# ── Servidor HTTPS principal ─────────────────────────────────────────────────
<VirtualHost *:443>
    ServerName 192.168.56.104
    DocumentRoot /var/www/html/agenda/public

    # ── SSL/TLS ───────────────────────────────────────────────────────────────
    SSLEngine             on
    SSLCertificateFile    /etc/pki/tls/certs/agenda.crt
    SSLCertificateKeyFile /etc/pki/tls/private/agenda.key
    # Para Let's Encrypt:
    # SSLCertificateFile    /etc/letsencrypt/live/tudominio/fullchain.pem
    # SSLCertificateKeyFile /etc/letsencrypt/live/tudominio/privkey.pem

    # ── Cabeceras de seguridad ────────────────────────────────────────────────
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"
    Header always set X-Content-Type-Options     "nosniff"
    Header always set X-Frame-Options            "SAMEORIGIN"
    Header always set Referrer-Policy            "no-referrer-when-downgrade"

    # ── Directorio raíz ───────────────────────────────────────────────────────
    <Directory /var/www/html/agenda/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
    </Directory>

    # ── Ocultar directorios internos ─────────────────────────────────────────
    <Directory /var/www/html/agenda/app>
        Require all denied
    </Directory>
    <Directory /var/www/html/agenda/config>
        Require all denied
    </Directory>

    # ── Logs ─────────────────────────────────────────────────────────────────
    ErrorLog  /var/log/httpd/agenda_error.log
    CustomLog /var/log/httpd/agenda_access.log combined
</VirtualHost>
